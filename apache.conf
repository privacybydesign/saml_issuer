<VirtualHost *:443>
    PassEnv SSP_APACHE_ALIAS
    PassEnv APACHE_CERT_PATH
    PassEnv APACHE_KEY_PATH
    PassEnv HOST_NAME
    PassEnv IRMA_SERVER_URL

    ServerName ${HOST_NAME}
    DocumentRoot /var/www/
    Alias /${SSP_APACHE_ALIAS} /var/simplesamlphp/public/

    RewriteEngine On
    RewriteRule ^/(nl|en)/(.*)$ /$2 [E=lang:$1,L,QSA]

    # HTTP security headers (requires mod_headers)
    <IfModule mod_headers.c>
        # These are safe for every path served by this vhost (the issuer app in
        # DocumentRoot and the bundled SimpleSAMLphp UI under the SSP alias).
        Header always set X-Content-Type-Options "nosniff"
        Header always set X-Frame-Options "DENY"
        Header always set Referrer-Policy "no-referrer"
        Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"

        # Strict CSP for the issuer's OWN pages, served from DocumentRoot only.
        # Inline scripts have been removed in favour of data-* attributes, so
        # 'unsafe-inline' is not needed for script-src. The Yivi frontend injects
        # its own styles ('unsafe-inline' for style-src) and renders the QR as a
        # data: URI (img-src data:). connect-src is limited to same-origin and the
        # configured IRMA/Yivi server (an https source also matches wss:// to that
        # host, covering the session-status websocket).
        <Directory /var/www>
            Header always set Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' ${IRMA_SERVER_URL}; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'"
        </Directory>

        # SimpleSAMLphp serves its own login/admin/error UI from this path (Alias
        # /${SSP_APACHE_ALIAS}). That UI may emit inline scripts/handlers, so it
        # gets a policy that permits inline scripts rather than the strict app
        # policy above, which would otherwise break the authentication flow.
        <Directory /var/simplesamlphp/public>
            Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'"
        </Directory>
    </IfModule>

                SSLEngine on
                SSLCertificateFile      ${APACHE_CERT_PATH}
                SSLCertificateKeyFile   ${APACHE_KEY_PATH}

                <FilesMatch "\.(cgi|shtml|phtml|php)$">
                                SSLOptions +StdEnvVars
                </FilesMatch>
                <Directory /usr/lib/cgi-bin>
                                SSLOptions +StdEnvVars
                </Directory>
                BrowserMatch "MSIE [2-6]" \
                                nokeepalive ssl-unclean-shutdown \
                                downgrade-1.0 force-response-1.0
                # MSIE 7 and newer should be able to use keepalive
                BrowserMatch "MSIE [17-9]" ssl-unclean-shutdown

    # In SSP 1 this was /var/simplesamlphp/www
    <Directory /var/simplesamlphp/public>
        Require all granted
    </Directory>
    IncludeOptional sites-enabled/ssp-override.cf
</VirtualHost>
