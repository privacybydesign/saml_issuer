<VirtualHost *:443>
    PassEnv SSP_APACHE_ALIAS
    PassEnv APACHE_CERT_PATH
    PassEnv APACHE_KEY_PATH
    PassEnv HOST_NAME

    ServerName ${HOST_NAME}
    DocumentRoot /var/www/
    Alias /${SSP_APACHE_ALIAS} /var/simplesamlphp/public/

    RewriteEngine On
    RewriteRule ^/(nl|en)/(.*)$ /$2 [E=lang:$1,L,QSA]

    # HTTP security headers (requires mod_headers)
    <IfModule mod_headers.c>
        Header always set X-Content-Type-Options "nosniff"
        Header always set X-Frame-Options "DENY"
        Header always set Referrer-Policy "no-referrer"
        Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
        # Scripts are served from same origin only; inline scripts have been removed
        # in favour of data-* attributes so 'unsafe-inline' is not needed for script-src.
        # The Yivi frontend injects its own styles, hence 'unsafe-inline' for style-src.
        # connect-src allows the (deployment-specific) IRMA/Yivi server over https/wss.
        Header always set Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https: wss:; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'"
    </IfModule>

                SSLEngine on
                SSLCertificateFile      ${APACHE_CERT_PATH}
                SSLCertificateKeyFile   ${APACHE_KEY_PATH}

                <FilesMatch "\.(cgi|shtml|phtml|php)$">
                                SSLOptions +StdEnvVars
                </FilesMatch>
                <Directory /usr/lib/cgi-bin>
                                SSLOptions +StdEnvVars
                </Directory>
                BrowserMatch "MSIE [2-6]" \
                                nokeepalive ssl-unclean-shutdown \
                                downgrade-1.0 force-response-1.0
                # MSIE 7 and newer should be able to use keepalive
                BrowserMatch "MSIE [17-9]" ssl-unclean-shutdown

    # In SSP 1 this was /var/simplesamlphp/www
    <Directory /var/simplesamlphp/public>
        Require all granted
    </Directory>
    IncludeOptional sites-enabled/ssp-override.cf
</VirtualHost>
